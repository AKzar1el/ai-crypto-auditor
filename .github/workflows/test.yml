name: CI Build Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify Build
        run: pnpm run build

      - name: Check for Uncommitted Changes in dist
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "Error: dist/ is out of date. Please run 'pnpm run build' locally and commit the changes."
            git diff dist/
            exit 1
          fi
